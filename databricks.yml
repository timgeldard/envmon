bundle:
  name: envmon
  databricks_cli_version: '>= 0.283.0'

variables:
  app_name:
    default: envmon
  warehouse_http_path:
    default: /sql/1.0/warehouses/e76480b94bea6ed5
  trace_catalog:
    default: connected_plant_uat
  trace_schema:
    default: gold
  em_plant_id:
    default: P225

targets:
  uat:
    default: true
    workspace:
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
  prod:
    workspace:
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}

resources:
  apps:
    envmon:
      name: ${var.app_name}
      description: Environmental Monitoring Visualisation App — Kerry Seville (P225)
      source_code_path: .
      user_api_scopes:
        - sql
      # Run `make deploy` rather than `databricks bundle deploy` directly.
      # The Makefile deploy target builds the frontend, renders app.yaml,
      # deploys the bundle, and applies the em_location_coordinates migration.

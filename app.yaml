# Databricks Apps configuration
# auth_type and requested_scopes are configured via the App Settings UI (User authorization)
command:
  - uvicorn
  - backend.main:app
  - --host
  - 0.0.0.0
  - --port
  - "8000"

env:
  - name: DATABRICKS_WAREHOUSE_HTTP_PATH
    value: "/sql/1.0/warehouses/REPLACE_WITH_WAREHOUSE_ID"

  - name: TRACE_CATALOG
    value: "connected_plant_uat"

  - name: TRACE_SCHEMA
    value: "gold"

  # EM-specific configuration
  - name: EM_PLANT_ID
    value: "P225"

  - name: EM_COORD_SCHEMA
    value: "gold"
